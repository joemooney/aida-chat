<svg class="aida-chart-svg" role="img" aria-label="Status distribution" viewBox="0 0 920 420" xmlns="http://www.w3.org/2000/svg">
<style>
.aida-chart-svg{width:100%;height:auto;display:block;background:linear-gradient(180deg,var(--bg-elev),var(--assistant));border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}
.title{fill:var(--text);font-size:18px;font-weight:700}.subtitle,.muted{fill:var(--text-dim);font-size:11px}.section{fill:var(--text);font-size:13px;font-weight:700}.label{fill:var(--text);font-size:12px;font-weight:600}.value{fill:var(--text);font-size:11px;font-weight:700}.hero{fill:var(--text);font-size:34px;font-weight:800}.grid{stroke:var(--border);stroke-width:1;opacity:.68}.track{fill:var(--border);opacity:.52}.empty{fill:var(--bg);stroke:var(--border);stroke-width:1}
</style>
<text x="28" y="34" class="title">Status distribution</text><text x="28" y="56" class="subtitle">27 active requirements</text><circle cx="160" cy="210" r="92" fill="none" stroke="var(--border)" stroke-width="28"/>
<circle cx="160" cy="210" r="92" fill="none" stroke="var(--accent)" stroke-width="28" stroke-dasharray="578" stroke-linecap="round" opacity=".88"/>
<text x="160" y="204" text-anchor="middle" class="hero">27</text><text x="160" y="232" text-anchor="middle" class="muted">requirements</text><g><text x="320" y="122" class="muted">Approved</text><text x="830" y="122" class="value">6 (22%)</text><rect x="320" y="131" width="530" height="10" rx="5" class="track"/><rect x="320" y="131" width="117.8" height="10" rx="5" fill="#3b82f6"/></g><g><text x="320" y="164" class="muted">Completed</text><text x="830" y="164" class="value">6 (22%)</text><rect x="320" y="173" width="530" height="10" rx="5" class="track"/><rect x="320" y="173" width="117.8" height="10" rx="5" fill="#10b981"/></g><g><text x="320" y="206" class="muted">Draft</text><text x="830" y="206" class="value">8 (30%)</text><rect x="320" y="215" width="530" height="10" rx="5" class="track"/><rect x="320" y="215" width="157.0" height="10" rx="5" fill="#6b7280"/></g><g><text x="320" y="248" class="muted">InProgress</text><text x="830" y="248" class="value">7 (26%)</text><rect x="320" y="257" width="530" height="10" rx="5" class="track"/><rect x="320" y="257" width="137.4" height="10" rx="5" fill="#f59e0b"/></g></svg>