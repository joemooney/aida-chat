  title: Per-user session manager with pluggable store
  description: |-
    A `SessionStore` trait abstracts how conversations are stored. `InMemorySessions` keyed by UUID is the only implementation for now. Each session holds the full message history (user/assistant/tool_use/tool_result). A background task evicts sessions idle > 1 hour.

    ## Acceptance
    - New session on `POST /api/sessions` returns a UUID.
    - `POST /api/chat?session_id=X` with a message body streams the agent reply over SSE and persists user+assistant turns to the session.
    - `GET /api/sessions/:id/history` returns the message list (for page reload).
    - Unknown session id returns 404 (not 500).
    - Trait shape lets a future Postgres-backed implementation drop in without changing the agent or HTTP layer.
