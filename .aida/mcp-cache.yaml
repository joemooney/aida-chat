    content: 'Implemented and smoke-tested end-to-end. `AIDA_CHAT_BACKEND=claude-cli cargo leptos serve`: /api/info returns {backend:claude-cli}; a chat turn streams tool badges + text deltas; turn 2 resumes turn 1 via --resume. Subprocess env strips ANTHROPIC_API_KEY so claude uses subscription auth, sidestepping the API-credit billing issue. Trade-off documented: under default Claude Code scope, the subprocess writes to its own ~/.claude/projects/.../memory/ — outside repo_root but normal Claude Code housekeeping.'
