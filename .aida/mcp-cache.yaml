- id: 019e2411-7b21-7b61-8e66-9f747a2db659
  spec_id: EPIC-1
  agreed_id: EPIC-1
  title: 'AIDA Chat: web UI talking to a scoped Rust agent backend'
  description: |-
    Build a ChatGPT/Claude-style web UI for this repository. A user opens a browser, types a question, and the backend spawns (or routes to) a per-user agent that can answer using only this repo's contents and the AIDA requirements store.

    ## Goals
    - Single chat-style web page with a text box and streamed assistant replies.
    - Per-user session on the backend (in-memory now; pluggable for multi-user later).
    - Agent is a custom Rust loop against the Anthropic Messages API, NOT a `claude` CLI subprocess.
    - Agent's tool surface is intentionally narrow and confined: read-only access to files under the repo root, ripgrep over those files, and read-only AIDA queries (`list`, `show`, `search`, `history`).

    ## Non-goals (this iteration)
    - Auth / login.
    - Persistent conversation history across server restarts.
    - Multi-tenant resource limits.
    - Pre-indexed embeddings / vector search.

    ## Acceptance
    - A user can `cargo leptos serve` the app, open it in a browser, ask "what AIDA epics are open?", and see a streamed answer that demonstrably called `aida` tools.
    - A user can ask "summarize the project overview" and see the agent read files from the repo to answer.
    - Path-escape attempts (e.g., `../../etc/passwd`) and `aida` subcommands outside the read-only allowlist are rejected at the tool layer with unit-test coverage.
    - The `SessionStore` is behind a trait so the in-memory implementation can be swapped without touching agent/HTTP layers.
  status: InProgress
  priority: High
