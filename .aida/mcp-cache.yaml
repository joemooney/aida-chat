- id: 019e242c-68e5-7d00-81bf-53fda289d415
  spec_id: ADR-6
  agreed_id: ADR-6
  title: Use a custom Rust agent loop talking directly to the Anthropic Messages API
  description: |-
    ## Decision
    The aida-chat backend implements its own streaming agent loop in Rust
    against `https://api.anthropic.com/v1/messages`. It does **not** spawn
    `claude` CLI subprocesses, and it does **not** use the Python or
    TypeScript Claude Agent SDK as a sidecar.

    ## Context
    Three viable backends were on the table:
    1. Custom Rust agent loop (chosen).
    2. Spawn `claude` CLI subprocess per user, with cwd=repo and permission
       settings restricting tools.
    3. Run a Python/TS Claude Agent SDK process as a sidecar; Leptos backend
       proxies to it.

    ## Rationale
    - The user requirement was "limit what the Claude session can query to
      just this repo and the aida-store." With a custom loop, the *set of
      tools we publish* is the *set of things the model can do* — scoping
      falls out naturally rather than being enforced by configuring a
      third-party agent's permission system.
    - Pure Rust binary — no Node.js or Python runtime needed on the server.
    - Streaming + tool dispatch in ~550 lines (`src/server/agent.rs`),
      small enough to audit.
    - No subprocess lifecycle to manage per user.

    ## Consequences
    - We own the SSE parser for Anthropic's stream events.
    - We can't piggyback on the Claude Agent SDK's automatic features
      (memory, compaction, prompt caching helpers) — if we want them we
      implement them.
    - Tool implementations are Rust functions, easy to unit-test (see
      the path-confinement tests in `src/server/tools/fs.rs`).

    ## Related
    - [[EPIC-1]] — the EPIC this decision underpins.
    - [[STORY-3]] — the agent-loop implementation.
  status: Approved
  priority: High
  owner: ''
  feature: Uncategorized
  created_at: 2026-05-14T01:49:10.757476810Z
  modified_at: 2026-05-14T01:49:10.757476810Z
  req_type: Decision
- id: 019e242c-9450-74b3-8ec6-46528d3a2dbc
  spec_id: ADR-7
  agreed_id: ADR-7
  title: Expose a tool-call surface; do not pre-stuff requirements into the system prompt
  description: |-
    ## Decision
    The agent's system prompt is short and tells the model *what tools
    exist*. The model calls tools (`aida_list`, `aida_show`, `read_file`,
    `grep_repo`, etc.) on demand to fetch what it needs. We do **not**
    pre-stuff the full requirements summary or repo contents into the
    system prompt.

    ## Context
    The existing `aida-server/src/chat.rs` (in the sibling `aida` repo)
    takes the opposite approach: it builds `project_context +
    requirements_summary + git_context` and inlines all of it into the
    system prompt at request time. That's why aida-server's chat works
    without tool use.

    When we considered reusing aida-server as the backend for this UI, we
    explicitly chose to go in a different direction.

    ## Rationale
    - **Scales with repo size and requirement count.** A pre-stuffed
      prompt grows linearly with project content; a tool-call surface
      stays small regardless.
    - **Always fresh.** Tool calls hit live state at request time. A
      pre-stuffed prompt goes stale within a single conversation if the
      user (or another agent) edits requirements mid-session.
    - **Cheaper.** No tokens spent shipping unread context. The model
      reads what it needs, when it needs it.
    - **Auditable.** The UI surfaces every tool call as a badge — the
      user can see exactly which files / requirements / searches the
      agent looked at to answer their question.

    ## Consequences
    - More round-trips per user turn (one Anthropic call + tool exec +
      another Anthropic call, vs. a single beefy prompt-stuffed call).
    - The agent loop has to be implemented end-to-end (covered by the
      [[decision-custom-rust-agent-loop]] decision).
    - Small projects with a tiny requirements set might actually be
      *slower* than the stuffed-prompt approach. Acceptable trade-off
      given the target use case is larger projects.

    ## Related
    - [[EPIC-1]], [[STORY-3]], [[STORY-4]]
    - Considered-and-rejected: pivot to building only a Leptos client
      for aida-server's existing `/api/v2/chat`. Rejected because the
      static-context approach doesn't fit "ask anything about the repo".
