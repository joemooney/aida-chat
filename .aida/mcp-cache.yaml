    author: joe
    content: 'Persistent claude subprocess per session implemented (LiveProcessRegistry + per-session actor in claude_cli.rs). claude is spawned once and fed user messages over stdin via --input-format stream-json. Pre-warm on POST /api/sessions amortizes spawn cost against user-typing time. Measured: turn 1 cold 4.25s -> with pre-warm 2.68s; warm turns 2.0-2.4s. Continuity verified via stash-and-recall test.'
    created_at: 2026-05-14T03:49:45.424968904Z
