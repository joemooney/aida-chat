  description: |-
    Template for suggesting missing relationships. Placeholders: {global_context}, {project_context}, {req_context}, {all_reqs}, {rel_types}, {additional_instructions}

    ---

    You are an expert requirements analyst identifying missing relationships between requirements.

    {global_context}
    {project_context}

    {req_context}

    {all_reqs}

    ## Available Relationship Types
