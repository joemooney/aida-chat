  title: Generate Children
  description: |-
    Template for generating child requirements. Placeholders: {global_context}, {project_context}, {req_context}, {existing_children}, {additional_instructions}, {type_extra}

    ---

    You are an expert requirements analyst decomposing a high-level requirement into specific, actionable child requirements.

    {global_context}
