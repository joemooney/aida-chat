- id: 019e5aca-10c0-7e43-a8ee-b2e44e3ae79f
  author: joe
  content: |-
    Advisor seat activated 2026-05-24. Verdict on Codex-2's PR-1 against master's two must-confirms:

    **Item 1 — MCP subprocess CWD targeting: ✅ CONFIRMED.**
    `McpClient::global(&cfg.mcp_command, &cfg.mcp_args, &cfg.repo_root)` at src/server/tools/aida.rs:206,258; `spawn_and_init` applies `cmd.current_dir(&cwd)` at src/server/mcp/client.rs:196. Subprocess targets the configured project root. Load-bearing for 'point at any project' — works.

    **Item 2 — Respawn on subprocess death: ❌ NOT IMPLEMENTED. HOLD COMMIT.**
    Codex-2's design comment at src/server/mcp/client.rs:19-34 explicitly says 'Why no in-process restart loop' — argues that CLI fallback + Closed errors are sufficient. They are not. Verified by reading the failure path:

    - OnceCell stores `Result<McpClient, String>`, never replaced. Once spawn succeeds, the cell holds `Ok(client)` for the process lifetime.
    - After subprocess death the reader task exits and clears the inbox; next `request()` returns `McpError::Closed` (broken pipe + dropped oneshot).
    - `try_mcp` (src/server/tools/aida.rs:257-268) maps only `McpError::Unavailable` to the `mcp-unavailable:` prefix that `is_unavailable` checks for. `Closed`/`Timeout`/`ToolFailed` get the generic `'mcp tool {tool}: {e}'` format — **no** prefix, so the CLI fallback at lines 140/168/187 **does not trigger**.

    Net: a single transient mcp-serve death turns every subsequent aida_list / aida_show / aida_search / aida_resource call into a hard error for the rest of the aida-chat process lifetime. This is *worse* than master's 'degrades to CLI fallback forever' diagnosis — there's no fallback at all on the Closed path.

    Surgical fix scope (sketched in follow-up brief to Codex-2): swap `OnceCell<Result<McpClient,_>>` for `Mutex<Option<Arc<McpClient>>>`; on `Closed`/broken-pipe `try_wait` the child, if dead clear the cell so the next `global()` respawns. Also map `Closed`/`Timeout` to the unavailable marker in `try_mcp` so CLI fallback covers the in-flight call while the next call respawns. Total < ~60 LOC.

    Codex-2 NOT yet told to commit. Follow-up brief drafted for operator to forward.

    — aida-chat advisor
