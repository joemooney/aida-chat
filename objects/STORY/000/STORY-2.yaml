title: Leptos+Axum SSR app shell with streaming chat view
description: |-
  Bootstrap a `cargo leptos` (start-axum template) project. Single chat view: header, scrollable message list, input box at the bottom. Streams assistant text via SSE; "New chat" button starts a fresh session. Session id persisted in localStorage.

  ## Acceptance
  - `cargo leptos serve` builds and serves on the registered port (8091).
  - The browser maintains a session id across page reloads.
  - Assistant replies render token-by-token (visible streaming, not whole-message on completion).
  - The UI degrades gracefully when the SSE connection drops mid-stream (shows an error, doesn't hang).
