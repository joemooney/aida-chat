title: Per-user rate limits + tool-iteration caps
description: |-
  ## Acceptance
  - Per-session cap on tool-loop iterations (already there in v0; expose via config).
  - Per-user cap on concurrent sessions.
  - Per-user cap on Anthropic spend per hour / per day.
  - Exceeding any cap returns a 429 with a clear `event: err` payload, not a hang.
