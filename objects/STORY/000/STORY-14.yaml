title: 'Tool-call inspector: click a badge to see full request/response'
description: |-
  ## Acceptance
  - Tool badges in the UI are clickable.
  - Clicking expands a panel showing the tool's full input JSON, full output text, and timing.
  - v0 only emits a short input preview; this story extends the SSE `tool` event payload and the SessionStore to preserve the full content.
