title: Auth in front of /api and the chat page
description: |-
  ## Acceptance
  - Unauthenticated requests to `/` and `/api/*` are redirected/refused.
  - Sessions in `SessionStore` are keyed by user_id, not just UUID.
  - A user can only fetch / chat with sessions they own (404 otherwise).
  - Auth provider is pluggable; v1 may ship with a single concrete impl (TBD).
