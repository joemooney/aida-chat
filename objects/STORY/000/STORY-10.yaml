title: Persistent SessionStore implementation
description: |-
  ## Acceptance
  - A second `SessionStore` impl (Postgres or sqlx-sqlite) is added behind the existing trait.
  - Conversations survive an `aida-chat` server restart.
  - The agent and HTTP layers compile unchanged when switching implementations.
  - An eviction policy is configurable (idle TTL, hard age cap, max-per-user).
